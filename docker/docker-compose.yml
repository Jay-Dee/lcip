version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: lcip
      POSTGRES_PASSWORD: lcip
      POSTGRES_DB: lcip
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lcip"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
